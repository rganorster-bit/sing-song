<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIT WAR - מילה אקראית</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    text-align:center;
    width:90%;
    max-width:500px;
}

h1{
    color:#d62828;
    margin-bottom:20px;
}

.word{
    font-size:42px;
    font-weight:bold;
    color:#ff6600;
    margin:30px 0;
    min-height:60px;
}

button{
    background:#d62828;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:20px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎵 HIT WAR 🎵</h1>

    <div class="word" id="word">
        לחצו על הכפתור לקבלת מילה
    </div>

    <button onclick="newWord()">הגרל מילה</button>
</div>

<script>

const words = [
"אהבה",
"ים",
"כוכב",
"גשם",
"חלום",
"אור",
"בית",
"עיר",
"לב",
"דרך",
"חיוך",
"שקט",
"יום",
"חיים",
"זמן",
"רוח"
];

function newWord() {
    const randomWord =
        words[Math.floor(Math.random() * words.length)];

    document.getElementById("word").innerText = randomWord;
}

</script>

</body>
